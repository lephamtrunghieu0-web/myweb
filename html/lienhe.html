<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - Portfolio</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- Font Awesome cho các biểu tượng -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <h1>LIÊN HỆ</h1>
        <nav>
            <ul>
                <li><a href="#"><i class="fas fa-home"></i></a></li>
                <li><a href="trangchu.html">Home</a></li>
                <li><a href="gioithieu.html">Giới thiệu</a></li>
                <li><a href="duan.html">Dự án</a></li>
                <li><a href="lienhe.html" class="active">Liên hệ</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="contact-wrapper">
            <!-- Khối thông tin liên hệ -->
            <section class="contact-info">
                <h3>THÔNG TIN LIÊN HỆ</h3>
                <div class="info-grid">
                    <div class="info-box">
                        <i class="far fa-envelope"></i>
                        <div>
                            <strong>Email</strong>
                            <p>email@gmail.com</p>
                        </div>
                    </div>
                    <div class="info-box">
                        <i class="fas fa-phone-alt"></i>
                        <div>
                            <strong>Số điện thoại</strong>
                            <p>+123 555 5889</p>
                        </div>
                    </div>
                    <div class="info-box">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <strong>Địa chỉ</strong>
                            <p>Nha Trang, Khánh Hòa, Vietnam</p>
                        </div>
                    </div>
                    <div class="info-box">
                        <i class="fas fa-globe"></i>
                        <div>
                            <strong>Website</strong>
                            <p>www.example.com</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Khối gửi tin nhắn -->
            <section class="contact-form">
                <h3>GỬI TIN NHẮN</h3>
                <form>
                    <div class="input-row">
                        <div class="input-group">
                            <i class="far fa-user"></i>
                            <input type="text" placeholder="Họ và tên">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-pen"></i>
                            <input type="text" placeholder="Tiêu đề">
                        </div>
                    </div>
                    <div class="input-group full-width">
                        <i class="far fa-envelope"></i>
                        <textarea placeholder="Nội dung tin nhắn"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">GỬI TIN NHẮN</button>
                </form>
            </section>
        </div>

        <!-- Khối bản đồ giả lập -->
        <div class="map-section">
            <img src="image_550899.png" alt="Map View">
            <div class="map-marker">
                <i class="fas fa-map-marker-alt"></i>
                <span>Nha Trang</span>
            </div>
        </div>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </div>
        <p>&copy; 2024 • All rights reserved</p>
    </footer>

</body>
</html>
